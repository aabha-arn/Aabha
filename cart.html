<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cart | Aabha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <h1 class="brand" onclick="location.href='index.html'" style="cursor:pointer">My Cart</h1>
</header>

<div class="container" style="max-width:800px;">
  <div id="cart-items"></div>
  <div class="card" style="margin-top:30px; padding:20px; text-align:right; background:var(--card);">
    <h2 id="total" style="margin-bottom:20px;">Total: ₹0</h2>
    <button class="primary-btn" onclick="checkout()" style="width:100%; padding:18px; font-size:18px;">Place Order on WhatsApp</button>
  </div>
</div>

<script>
function renderCart() {
  const cart = JSON.parse(localStorage.getItem("guestCart") || "[]");
  const box = document.getElementById("cart-items");
  let total = 0;
  box.innerHTML = cart.length === 0 ? "<p style='text-align:center; padding:40px; color:#888;'>Your cart is empty</p>" : "";

  cart.forEach((item, i) => {
    total += Number(item.price);
    box.innerHTML += `
      <div class="card" style="display:flex; align-items:center; gap:20px; margin-bottom:15px; background:var(--card);">
        <img src="${item.image}" style="width:90px; height:90px; object-fit:cover; border-radius:12px;">
        <div style="flex:1;">
          <h3 style="margin:0; font-size:18px;">${item.name}</h3>
          <p style="color:var(--primary); font-weight:bold; margin:8px 0;">₹${item.price}</p>
        </div>
        <button onclick="remove(${i})" style="background:#ff4444; color:white; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer; font-size:20px;">&times;</button>
      </div>`;
  });
  document.getElementById("total").innerText = "Total: ₹" + total;
}

function remove(index) {
  let cart = JSON.parse(localStorage.getItem("guestCart") || "[]");
  cart.splice(index, 1);
  localStorage.setItem("guestCart", JSON.stringify(cart));
  renderCart();
}

function checkout() {
  const cart = JSON.parse(localStorage.getItem("guestCart") || "[]");
  if(cart.length === 0) return alert("Cart is empty");

  let text = "*Order Summary from Aabha Site*:\n\n";
  let total = 0;
  cart.forEach(item => {
    text += `- ${item.name} (₹${item.price})\n`;
    total += Number(item.price);
  });
  text += `\n*Grand Total: ₹${total}*`;

  window.open(`https://wa.me/916238507436?text=${encodeURIComponent(text)}`, "_blank");
}
renderCart();
</script>
</body>
</html>
