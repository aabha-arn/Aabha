<div class="header-actions">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
    <i class="fa-solid fa-magnifying-glass"></i>
  </div>
  <div class="auth-buttons">
    <button onclick="location.href='cart.html'">
      <i class="fa-solid fa-cart-shopping"></i>
    </button>
  </div>
</div>

<header class="site-header">
  <h1 class="brand">Aabha</h1>
  <p class="tagline">Where Tradition Meets Trends.</p>
</header>

<div class="container">
  <div class="products-grid" id="products-container">
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAskFF6Xn-ZfYSxd5hUZkNG-7BIhAH9Lj4",
  authDomain: "aabha-e46fa.firebaseapp.com",
  projectId: "aabha-e46fa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allProducts = [];
const container = document.getElementById("products-container");

// Load Products
db.collection("products").orderBy("createdAt", "desc").get()
  .then(snapshot => {
    allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderProducts(allProducts);
  });

function renderProducts(list) {
  container.innerHTML = "";
  if (list.length === 0) {
    container.innerHTML = "<p class='muted'>No products found</p>";
    return;
  }

  list.forEach(p => {
    const imageUrl = p.images?.[0] || p.image || "https://via.placeholder.com/300";
    container.innerHTML += `
      <article class="product-card" onclick="openProduct('${p.id}')">
        <div class="product-image">
          <img src="${imageUrl}" alt="${p.name}">
        </div>
        <div class="product-info">
          <h3>${p.name}</h3>
          <p class="desc">${p.description || ""}</p>
          <div class="card-footer">
            <span class="price">₹${p.price}</span>
            <button class="primary-btn">View Details</button>
          </div>
        </div>
      </article>
    `;
  });
}

function searchProducts() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
}

function openProduct(id) {
  location.href = "product-details.html?id=" + id;
}

// Drawer Logic
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.onclick = () => {
  sidebar.classList.add("open");
  overlay.classList.add("show");
};

overlay.onclick = () => {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
};

function openWhatsApp(msg) {
  const phone = "916238507436";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
}
</script>
