<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Details | Aabha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>
<header class="site-header">
  <h1 class="brand" onclick="location.href='index.html'" style="cursor:pointer">Aabha</h1>
</header>

<div class="container" id="product-box">
  <p style="text-align:center; padding:50px;">Loading product details...</p>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAskFF6Xn-ZfYSxd5hUZkNG-7BIhAH9Lj4",
  authDomain: "aabha-e46fa.firebaseapp.com",
  projectId: "aabha-e46fa"
});
const db = firebase.firestore();
const productId = new URLSearchParams(window.location.search).get("id");
let currentProduct = null;

db.collection("products").doc(productId).get().then(doc => {
  if (!doc.exists) {
    document.getElementById("product-box").innerText = "Product not found";
    return;
  }
  currentProduct = doc.data();
  renderProduct();
});

function renderProduct() {
  // Logic Fix: Combine images and image fields, then filter out duplicates/empty strings
  let rawImages = [];
  if (Array.isArray(currentProduct.images)) rawImages = [...currentProduct.images];
  if (currentProduct.image) rawImages.push(currentProduct.image);

  // Filter to keep only unique, valid URLs
  const uniqueImages = [...new Set(rawImages)].filter(url => url && url.trim() !== "");
  
  // If no images at all, use placeholder
  const finalImages = uniqueImages.length > 0 ? uniqueImages : ["https://via.placeholder.com/420"];

  // Only show thumbnails if there is more than 1 unique image
  const thumbsHtml = finalImages.length > 1 
    ? `<div class="thumbs">${finalImages.map(i => `<img src="${i}" onclick="document.getElementById('mainImg').src='${i}'">`).join("")}</div>`
    : "";

  document.getElementById("product-box").innerHTML = `
    <div class="product-layout">
      <div class="image-section">
        ${thumbsHtml}
        <img id="mainImg" src="${finalImages[0]}" class="main-img">
      </div>
      <div class="details">
        <h2>${currentProduct.name}</h2>
        <p class="desc">${currentProduct.description || "No description available."}</p>
        <div class="price" style="font-size:32px; color:var(--primary); margin:20px 0;">₹${currentProduct.price}</div>
        <div class="actions">
          <button class="primary-btn" onclick="buyNow()">Buy Now</button>
          <button class="primary-btn btn-outline" onclick="addToGuestCart()" style="background:#2a2a2a; border:1px solid #444; margin-top:10px;">Add to Cart</button>
        </div>
      </div>
    </div>
  `;
}

function buyNow() {
  const msg = encodeURIComponent(`*Order Inquiry*\nProduct: ${currentProduct.name}\nPrice: ₹${currentProduct.price}\nLink: ${window.location.href}`);
  window.open(`https://wa.me/916238507436?text=${msg}`, "_blank");
}

function addToGuestCart() {
  let cart = JSON.parse(localStorage.getItem("guestCart") || "[]");
  cart.push({ 
    id: productId, 
    name: currentProduct.name, 
    price: currentProduct.price, 
    image: currentProduct.image || currentProduct.images?.[0] 
  });
  localStorage.setItem("guestCart", JSON.stringify(cart));
  alert("Added to cart! 🛒");
  location.href = "cart.html";
}
</script>

<style>
  /* Extra styling to ensure the layout handles the single vs multiple images nicely */
  .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
  .image-section { display: flex; gap: 15px; }
  .thumbs { display: flex; flex-direction: column; gap: 10px; width: 80px; }
  .thumbs img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); }
  .thumbs img:hover { border-color: var(--primary); }
  .main-img { width: 100%; max-height: 500px; object-fit: cover; border-radius: 15px; background: #000; }
  
  @media (max-width: 768px) {
    .product-layout { grid-template-columns: 1fr; }
    .image-section { flex-direction: column-reverse; }
    .thumbs { flex-direction: row; width: 100%; overflow-x: auto; }
  }
</style>
</body>
</html>
